name = "niu-estoque"
main = "src/worker.js"
compatibility_date = "2024-09-01"

[[d1_databases]]
binding = "DB"
database_name = "estoque-db"
database_id = "ba514db4-66ed-46a8-9d7c-47c8ff02e623"

[assets]
directory = "public"
binding = "ASSETS"

# Backup automático diário do banco (envia um dump JSON por e-mail) — roda às 3h UTC.
[triggers]
crons = ["0 3 * * *"]

# Defina o secret com: wrangler secret put RESEND_API_KEY

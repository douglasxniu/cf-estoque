<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>QR Scan · Estoque</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="/theme.js"></script>
<link rel="stylesheet" href="/theme.css">
<script src="/auth-gate.js"></script>
<style>
:root{--brd:var(--border);--r:16px}
*{margin:0;padding:0}
body{font-size:14.5px;min-height:100vh;padding:12px 12px 80px}
.g{background:var(--surface);border:1px solid var(--brd);border-radius:var(--r);backdrop-filter:blur(10px) saturate(130%);box-shadow:var(--shadow-card)}
header{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px}
header a{text-decoration:none;display:flex;align-items:center;gap:10px}
.sub{font-size:.75rem;color:var(--muted)}
.tabs{display:flex;gap:6px;margin-bottom:12px}
.tb{flex:1;padding:10px 6px;border-radius:10px;border:1px solid var(--brd);background:var(--surface-hover);color:var(--muted);cursor:pointer;font-weight:700;font-size:.78rem;font-family:inherit}
.tb.active{background:linear-gradient(135deg,rgba(91,140,255,.25),rgba(124,92,255,.2));color:#fff;border-color:rgba(91,140,255,.4)}
.card{padding:14px;margin-bottom:10px}
.btn{border:none;border-radius:12px;padding:13px;font-weight:700;cursor:pointer;font-size:.9rem;width:100%;font-family:inherit;margin-bottom:8px}
.btn-cam{background:linear-gradient(135deg,#f5a623,#d6890a);color:#1f2937}
.btn-ok{background:linear-gradient(135deg,var(--ok),#059669);color:#fff}
.btn-dev{background:linear-gradient(135deg,var(--primary),#4c1d95);color:#fff}
.btn-sec{background:var(--surface-hover);color:var(--text);border:1px solid var(--brd)}
#camBox{display:none;position:relative;border-radius:var(--r);overflow:hidden;margin-bottom:10px;aspect-ratio:4/3;background:#000}
#camBox video{width:100%;height:100%;object-fit:cover;display:block}
#camBox canvas{display:none}
.scan-line{position:absolute;left:5%;right:5%;height:2px;background:linear-gradient(90deg,transparent,var(--primary),transparent);animation:sl 1.8s linear infinite}
@keyframes sl{0%{top:15%}50%{top:85%}100%{top:15%}}
#status{position:absolute;bottom:6px;left:6px;background:rgba(0,0,0,.65);color:#fff;font-size:.62rem;padding:3px 8px;border-radius:6px}
.sol{padding:10px 0;border-bottom:1px solid var(--brd)}
.sol:last-child{border-bottom:none}
.sol-ot{font-weight:800;font-size:.92rem}
.sol-local{color:var(--ok);font-weight:700;font-size:.82rem;margin:3px 0}
.sol-meta{font-size:.72rem;color:var(--muted)}
.qty{font-size:2.4rem;font-weight:800;color:var(--ok);line-height:1;margin:10px 0 4px}
.qty.low{color:var(--warn)}.qty.zero{color:var(--danger)}
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:.7rem;font-weight:700;background:var(--surface-hover);margin-right:3px}
.empty{color:var(--muted);text-align:center;padding:20px;font-size:.85rem}
.toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%) translateY(8px);background:rgba(20,22,30,.95);color:#fff;padding:11px 20px;border-radius:30px;font-weight:600;font-size:.82rem;opacity:0;transition:.25s;z-index:99;border:1px solid var(--brd);white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.bnav{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--surface-2);border-top:1px solid var(--border);backdrop-filter:blur(18px);padding:8px 0 10px;z-index:50}
.bnav a{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--muted);font-size:.58rem;font-weight:700;text-decoration:none;text-transform:uppercase}
.bnav a.active{color:var(--primary)}
.bnav svg{width:20px;height:20px}
label{font-size:.72rem;color:var(--muted);font-weight:700;display:block;margin-bottom:4px;margin-top:10px}
input{width:100%;padding:11px 12px;border:1px solid var(--brd);border-radius:10px;background:var(--surface-2);color:var(--text);font-size:.9rem;font-family:inherit}
input:focus{outline:none;border-color:var(--primary)}
input::placeholder{color:var(--muted-2)}
.citem{padding:10px;background:var(--surface-hover);border:1px solid var(--brd);border-radius:10px;margin-bottom:8px}
</style>
</head>
<body>

<header>
  <a href="/index.html" style="text-decoration:none;display:flex;align-items:center;gap:10px">
    <svg width="70" height="20" viewBox="0 0 36.4 10.22" fill="currentColor" style="color:var(--text)">
      <rect x="16.96" y="0" width="2.47" height="10.22"/>
      <path d="M22.04,4.83V0h2.47v4.74c0,2.09.6,3.1,1.88,3.1s2.8-.77,4.53-2.03l2.98-2.06V0h2.5v10.22h-2.32c0-1.13,0-2.86.06-3.99-3.99,2.68-5.78,3.99-8.14,3.99-2.53,0-3.96-1.64-3.96-5.39"/>
      <path d="M14.36,5.39v4.83h-2.47v-4.74c0-2.09-.6-3.1-1.88-3.1s-2.8.77-4.53,2.03l-2.98,2.06v3.76H0V0h2.32c0,1.13,0,2.86-.06,3.99C6.26,1.31,8.05,0,10.4,0c2.53,0,3.96,1.64,3.96,5.39"/>
    </svg>
    <div><div style="font-weight:800;color:var(--text);font-size:.95rem">Estoque Elétrica</div><div class="sub">Leitor QR</div></div>
  </a>
  <button class="theme-toggle" title="Alternar tema" aria-label="Alternar tema claro/escuro">
    <svg class="ic-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    <svg class="ic-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
  </button>
</header>

<div class="tabs">
  <button class="tb active" onclick="setTab('consulta')">Consulta</button>
  <button class="tb" onclick="setTab('ot')">Entrega/Devolução</button>
  <button class="tb" onclick="setTab('carrinho')">Carrinho<span id="cbadge"></span></button>
</div>

<div class="card g">
  <button class="btn btn-cam" id="btnCam" onclick="toggleCam()">Ativar câmera</button>
  <div id="camBox">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <div class="scan-line"></div>
    <div id="status">aguardando...</div>
  </div>
</div>

<div id="app"><div class="empty">Leia um QR Code para começar</div></div>
<div class="toast" id="toast"></div>

<div id="otModalOverlay" style="display:none;position:fixed;inset:0;background:rgba(5,6,10,.7);z-index:90;align-items:center;justify-content:center;padding:16px">
  <div style="background:var(--surface-2);border:1px solid var(--border);border-radius:18px;max-width:420px;width:100%;max-height:85vh;overflow-y:auto;padding:20px;box-shadow:var(--shadow-float)">
    <div id="otModalBody"><div class="empty">A carregar...</div></div>
    <button onclick="document.getElementById('otModalOverlay').style.display='none'" style="width:100%;margin-top:14px;padding:11px;border:none;border-radius:10px;background:var(--surface-hover);color:var(--text);font-weight:700;cursor:pointer;font-family:inherit">Fechar</button>
  </div>
</div>

<nav class="bnav">
  <a href="/index.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>Dashboard</a>
  <a href="/solicitar.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>Solicitar</a>
  <a href="/scan.html" class="active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><path d="M14 14h.01M14 18h.01M18 14h.01M18 18h.01"/></svg>Leitor QR</a>
</nav>

<script src="/vendor/jsQR.js"></script>
<script>
const API='/api';
const p=new URLSearchParams(location.search);
let itemId=p.get('id'), unitId=p.get('uid');
let tab='consulta', itemData=null, solicData=[], camOn=false;
let unidadeAtual=null, pendentesCandidatos=[];
let scanInt=null, lastScan=0, detector=null, scanning=false, carrinho=[];

const esc=s=>String(s??'').replace(/[<>&"]/g,c=>({"<":"&lt;",">":"&gt;","&":"&amp;",'"':"&quot;"}[c]));

function toast(m,t='ok'){
  beep(t);
  const el=document.getElementById('toast');
  el.textContent=m; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),3000);
}

function beep(t){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.frequency.value=t==='ok'?880:t==='dev'?660:220;
    g.gain.setValueAtTime(.3,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.4);
    o.start();o.stop(ctx.currentTime+.5);
  }catch(e){}
  if(navigator.vibrate) navigator.vibrate(t==='ok'?[80]:t==='dev'?[80,50,80]:[200]);
}

function setTab(t){
  tab=t;
  document.querySelectorAll('.tb').forEach((b,i)=>b.classList.toggle('active',['consulta','ot','carrinho'][i]===t));
  renderApp();
}

/* ===== CÂMERA ===== */
async function toggleCam(){
  if(camOn){stopCam();return;}
  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'}}});
    const v=document.getElementById('video');
    v.srcObject=stream;
    document.getElementById('camBox').style.display='block';
    document.getElementById('btnCam').textContent='Parar câmera';
    camOn=true;
    if('BarcodeDetector' in window){
      try{detector=new BarcodeDetector({formats:['qr_code']});}catch(e){detector=null;}
    }
    v.oncanplay=()=>{ if(!scanInt) scanInt=setInterval(doScan,250); };
    await v.play().catch(()=>{});
  }catch(e){toast('Câmera: '+e.message,'err');}
}

function stopCam(){
  const v=document.getElementById('video');
  if(v.srcObject) v.srcObject.getTracks().forEach(t=>t.stop());
  v.srcObject=null;
  document.getElementById('camBox').style.display='none';
  document.getElementById('btnCam').textContent='Ativar câmera';
  camOn=false;
  if(scanInt){clearInterval(scanInt);scanInt=null;}
}

async function doScan(){
  if(!camOn||scanning) return;
  const v=document.getElementById('video'),st=document.getElementById('status');
  if(v.readyState<2||v.videoWidth===0){if(st)st.textContent='aguardando vídeo...';return;}
  scanning=true;
  const now=Date.now();
  let val=null;
  try{
    if(detector){
      const r=await detector.detect(v).catch(()=>[]);
      if(r.length) val=r[0].rawValue;
    }
    if(!val&&typeof jsQR!=='undefined'){
      const c=document.getElementById('canvas');
      c.width=v.videoWidth;c.height=v.videoHeight;
      const ctx=c.getContext('2d');
      ctx.drawImage(v,0,0);
      const d=ctx.getImageData(0,0,c.width,c.height);
      const qr=jsQR(d.data,d.width,d.height,{inversionAttempts:'attemptBoth'});
      if(qr) val=qr.data;
    }
    if(st) st.textContent=val?'✓ QR detetado!':(detector?'BarcodeDetector ativo':'jsQR '+v.videoWidth+'x'+v.videoHeight);
    if(val&&now-lastScan>2500){lastScan=now;handleQR(val);}
  }catch(e){if(st)st.textContent='erro:'+e.message;}
  scanning=false;
}

function handleQR(url){
  try{
    const u=new URL(url);
    const uid=u.searchParams.get('uid');
    const id=u.searchParams.get('id');
    const ot=u.searchParams.get('ot');
    if(!uid&&!id&&!ot){toast('QR não reconhecido','err');return;}
    if(ot){ mostrarOTModal(ot); return; }
    if(tab==='carrinho'&&id&&!uid){adicionarCarrinho(id);return;}
    if(uid){itemId=null;unitId=uid;}else{unitId=null;itemId=id;}
    toast('QR lido!');
    carregarItem();
  }catch(e){toast('QR inválido','err');}
}

async function mostrarOTModal(ot){
  beep('ok');
  const overlay=document.getElementById('otModalOverlay');
  const body=document.getElementById('otModalBody');
  overlay.style.display='flex';
  body.innerHTML='<div class="empty">A carregar...</div>';
  const items=await fetch(`${API}/ot/${encodeURIComponent(ot)}`).then(r=>r.json()).catch(()=>[]);
  if(!items.length){body.innerHTML='<div class="empty">OT não encontrada.</div>';return;}
  const first=items[0];
  const devolvidos=items.filter(i=>i.status==='devolvido').length;
  const iconFor=n=>{const l=n?.toLowerCase()||'';return l.includes('led')?'💡':l.includes('transf')?'⚡':l.includes('cabo')?'🔌':l.includes('lamp')?'🔆':'📦';};
  body.innerHTML=`
    <div style="font-size:.65rem;color:var(--muted);letter-spacing:.06em;font-weight:700">ORDEM DE TRABALHO</div>
    <div style="font-size:1.5rem;font-weight:800;color:var(--primary);margin:2px 0 8px">${ot}</div>
    <div style="font-size:.85rem;color:var(--muted);margin-bottom:2px">${first.solicitante||'—'}${first.setor?' · '+first.setor:''}</div>
    <div style="font-size:.78rem;color:var(--muted);margin-bottom:14px">${devolvidos}/${items.length} devolvidos</div>
    <div style="border-top:1px solid var(--border);padding-top:10px">
      ${items.map(i=>`
        <div style="display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)">
          <span style="font-size:1.1rem">${iconFor(i.item_nome)}</span>
          <div style="flex:1">
            <div style="font-weight:700;font-size:.86rem">${i.item_nome}</div>
            <div style="font-size:.74rem;color:var(--muted)">${i.quantidade} ${i.unidade||''}${i.local_uso?' · '+i.local_uso:''}</div>
          </div>
          <span style="font-size:.65rem;font-weight:800;padding:2px 8px;border-radius:20px;align-self:flex-start;background:${i.status==='devolvido'?'rgba(52,211,153,.12)':i.status==='aprovado'?'rgba(91,140,255,.12)':'rgba(251,191,36,.12)'};color:${i.status==='devolvido'?'#34d399':i.status==='aprovado'?'#5b8cff':'#fbbf24'}">${i.status==='devolvido'?'Devolvido':i.status==='aprovado'?'Entregue':'Pendente'}</span>
        </div>`).join('')}
    </div>
  `;
}

/* ===== DADOS ===== */
async function carregarItem(){
  document.getElementById('app').innerHTML='<div class="empty">A carregar...</div>';
  unidadeAtual=null; pendentesCandidatos=[];
  try{
    if(unitId){
      const u=await fetch(`${API}/unidades/${unitId}`).then(r=>r.ok?r.json():null);
      if(!u){document.getElementById('app').innerHTML='<div class="empty">Unidade não encontrada.</div>';return;}
      unidadeAtual=u;
      itemData={id:u.item_id,nome:u.nome,categoria:u.categoria,voltagem:u.voltagem,modelo:u.modelo,unidade:u.unidade,codigo:u.codigo};
      if(u.status==='disponivel'){
        pendentesCandidatos=await fetch(`${API}/itens/${u.item_id}/pendentes`).then(r=>r.json()).catch(()=>[]);
      }
    } else {
      const [it,sl]=await Promise.all([
        fetch(`${API}/itens/${itemId}`).then(r=>r.ok?r.json():null),
        fetch(`${API}/solicitacoes?item_id=${itemId}&status=aberto`).then(r=>r.json()).catch(()=>[])
      ]);
      if(!it){document.getElementById('app').innerHTML='<div class="empty">Item não encontrado.</div>';return;}
      itemData=it; solicData=sl;
    }
  }catch(e){document.getElementById('app').innerHTML='<div class="empty">Erro: '+e.message+'</div>';return;}
  renderApp();
}

function renderApp(){
  if(tab==='carrinho'){renderCarrinho();return;}
  if(!itemData){document.getElementById('app').innerHTML='<div class="empty">Leia um QR Code para começar</div>';return;}
  const it=itemData;
  let h=`<div class="card g">
    <div style="font-size:1.2rem;font-weight:800">${esc(it.nome)}</div>
    ${unidadeAtual?`<div style="color:var(--primary);font-weight:700;font-size:.78rem;margin:3px 0">${esc(unidadeAtual.serial)}</div>`:it.codigo?`<div style="color:var(--primary);font-weight:700;font-size:.78rem;margin:3px 0">${esc(it.codigo)}</div>`:''}
    <div>${it.voltagem?`<span class="badge">${esc(it.voltagem)}</span>`:''}${it.modelo?`<span class="badge">${esc(it.modelo)}</span>`:''}${it.categoria?`<span class="badge">${esc(it.categoria)}</span>`:''}</div>`;
  if(tab==='consulta'){
    const qc=(it.quantidade??'—').toString();
    h+=`<div class="qty ${qc==='0'?'zero':parseInt(qc)<=5?'low':''}">${qc}</div>
    <div style="color:var(--muted);font-size:.82rem">${esc(it.unidade||'')} em stock</div>`;
  } else {
    h+=`<div style="margin-top:8px;font-size:.82rem;color:var(--muted)">Stock: <b style="color:var(--text)">${it.quantidade??'—'} ${esc(it.unidade||'')}</b></div>`;
  }
  h+=`</div>`;
  if(tab==='ot'){
    h+= unidadeAtual ? renderTabOtUnidade() : renderTabOtItemGenerico();
  }
  document.getElementById('app').innerHTML=h;
}

// Item genérico (sem QR de unidade física) — mantém o fluxo antigo por linha de solicitação.
function renderTabOtItemGenerico(){
  const abertas=solicData.filter(s=>s.status==='pendente'||s.status==='aprovado');
  if(!abertas.length) return `<div class="empty g" style="padding:16px;border-radius:var(--r)">Sem solicitações abertas para este item.</div>`;
  return `<div class="card g">` + abertas.map(s=>`
    <div class="sol">
      <div class="sol-ot">OT ${esc(s.ot)}</div>
      <div class="sol-local">📍 ${esc(s.local_uso||s.setor||'Local não informado')}</div>
      <div class="sol-meta">${s.quantidade} ${esc(s.unidade||itemData.unidade||'')} · ${esc(s.solicitante||'')}</div>
      <div style="margin-top:10px">
        ${s.status==='pendente'?`<button class="btn btn-ok" onclick="acao('aprovar',${s.id})">✓ Confirmar solicitação</button>`:''}
        ${s.status==='aprovado'?`<button class="btn btn-dev" onclick="acao('devolver',${s.id})">↩ Devolver ao estoque</button>`:''}
      </div>
    </div>`).join('') + `</div>`;
}

// Unidade física escaneada: vincula à OT (saída) ou devolve ao estoque (volta).
function renderTabOtUnidade(){
  const u=unidadeAtual;
  if(u.status!=='disponivel'){
    return `<div class="card g"><div class="sol">
      <div class="sol-ot">OT ${esc(u.ot)}</div>
      <div class="sol-local">📍 ${esc(u.local_uso||u.setor||'Local não informado')}</div>
      <div class="sol-meta">${esc(u.solicitante||'')}</div>
      <div style="margin-top:10px"><button class="btn btn-dev" onclick="devolverUnidade()">↩ Devolver ao estoque</button></div>
    </div></div>`;
  }
  if(!pendentesCandidatos.length){
    return `<div class="empty g" style="padding:16px;border-radius:var(--r)">Nenhuma OT em aberto está pedindo este item no momento.</div>`;
  }
  return `<div class="card g">
    <div style="font-size:.78rem;color:var(--muted);font-weight:700;margin-bottom:8px">ENVIAR ESTA UNIDADE PARA:</div>
    ${pendentesCandidatos.map(p=>`
      <div class="sol">
        <div class="sol-ot">OT ${esc(p.ot)}</div>
        <div class="sol-local">📍 ${esc(p.local_uso||p.setor||'Local não informado')}</div>
        <div class="sol-meta">${p.vinculadas}/${p.quantidade} vinculado(s) · ${esc(p.solicitante||'')}</div>
        <div style="margin-top:10px"><button class="btn btn-ok" onclick="vincularUnidade(${p.id})">✓ Enviar para esta OT</button></div>
      </div>`).join('')}
  </div>`;
}

async function vincularUnidade(solicitacaoId){
  const r=await fetch(`${API}/unidades/${unitId}/vincular`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({solicitacaoId})});
  if(r.ok){toast('Unidade vinculada à OT!');carregarItem();}
  else{const e=await r.json().catch(()=>({}));toast('Erro: '+(e.error||'falha'),'err');}
}

async function devolverUnidade(){
  const r=await fetch(`${API}/unidades/${unitId}/devolver-unidade`,{method:'POST'});
  if(r.ok){toast('Devolvido ao estoque!','dev');carregarItem();}
  else{const e=await r.json().catch(()=>({}));toast('Erro: '+(e.error||'falha'),'err');}
}

async function acao(tipo,id){
  const r=await fetch(`${API}/solicitacoes/${id}/${tipo}`,{method:'PATCH'});
  if(r.ok){toast(tipo==='aprovar'?'Entrega registada!':'Devolvido ao estoque!',tipo==='aprovar'?'ok':'dev');carregarItem();}
  else toast('Erro.','err');
}

/* ===== CARRINHO / NOVA OT ===== */
async function adicionarCarrinho(id){
  const it=await fetch(`${API}/itens/${id}`).then(r=>r.ok?r.json():null);
  if(!it){toast('Item não encontrado','err');return;}
  const ex=carrinho.find(c=>c.id==id);
  if(ex) ex.qtd++;
  else carrinho.push({id:it.id,nome:it.nome,unidade:it.unidade,maxQtd:it.quantidade,qtd:1});
  toast(it.nome+' adicionado!');
  document.getElementById('cbadge').textContent=' ('+carrinho.length+')';
  setTab('carrinho');
}

function renderCarrinho(){
  let h=`<div class="card g">`;
  if(!carrinho.length){
    h+=`<div class="empty">Ative a câmera e leia QR Codes dos itens</div>`;
  } else {
    carrinho.forEach(c=>{
      h+=`<div class="citem">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <b>${esc(c.nome)}</b>
          <button onclick="carrinho=carrinho.filter(x=>x.id!=${c.id});renderCarrinho();" style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:.9rem">✕</button>
        </div>
        <div style="display:flex;align-items:center;gap:10px;margin-top:8px">
          <button onclick="carrinho.find(x=>x.id==${c.id}).qtd=Math.max(1,${c.qtd}-1);renderCarrinho();" style="width:32px;height:32px;border-radius:8px;border:1px solid var(--brd);background:var(--surface-hover);color:var(--text);font-size:1rem;cursor:pointer">−</button>
          <span style="flex:1;text-align:center;font-weight:800;font-size:1.1rem">${c.qtd} ${esc(c.unidade)}</span>
          <button onclick="carrinho.find(x=>x.id==${c.id}).qtd=Math.min(${c.maxQtd},${c.qtd}+1);renderCarrinho();" style="width:32px;height:32px;border-radius:8px;border:1px solid var(--brd);background:var(--surface-hover);color:var(--text);font-size:1rem;cursor:pointer">+</button>
        </div>
      </div>`;
    });
  }
  h+=`</div>`;
  if(carrinho.length){
    h+=`<div class="card g">
      <div style="font-size:.75rem;color:var(--muted);font-weight:700;letter-spacing:.04em">DADOS DA OT</div>
      <label>OT (vazio = criar novo projeto)</label><input id="otN" placeholder="Ex: OT-2026-0145">
      <label>Local de uso *</label><input id="otL" placeholder="Ex: Fachada · Letreiro Principal">
      <label>Solicitante *</label><input id="otS" placeholder="Nome completo">
      <label>Setor</label><input id="otSe" placeholder="Opcional" style="margin-bottom:14px">
      <button class="btn btn-ok" onclick="enviarOT()">Lançar OT (${carrinho.length} item${carrinho.length>1?'s':''})</button>
    </div>`;
  }
  document.getElementById('app').innerHTML=h;
}

async function enviarOT(){
  const otDigitado=document.getElementById('otN').value.trim();
  const local=document.getElementById('otL').value.trim();
  const nome=document.getElementById('otS').value.trim();
  const setor=document.getElementById('otSe').value.trim();
  if(!local||!nome){toast('Preencha local e nome','err');return;}

  let ot=otDigitado;
  if(!ot){
    const p=await fetch(`${API}/projetos`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({setor,nome:local})}).then(r=>r.json()).catch(()=>null);
    if(!p?.numero){ toast('Erro ao reservar número de projeto','err'); return; }
    ot=p.numero;
  } else {
    // garante que o projeto existe; se já existir (409), apenas adiciona os itens a ele
    const rProj=await fetch(`${API}/projetos`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({numero:ot,setor,nome:local})});
    if(!rProj.ok && rProj.status!==409){ toast('Erro ao validar o projeto','err'); return; }
  }

  const r=await fetch(`${API}/solicitacoes/lote`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ot,solicitante:nome,setor,itens:carrinho.map(c=>({itemId:c.id,quantidade:c.qtd,localUso:local}))})});
  if(r.ok){toast('OT '+ot+' registada!');carrinho=[];document.getElementById('cbadge').textContent='';renderCarrinho();}
  else{const e=await r.json().catch(()=>({}));toast('Erro: '+(e.error||'falha'),'err');}
}

// Carregar se veio com parâmetros
if(itemId||unitId) carregarItem();
</script>
